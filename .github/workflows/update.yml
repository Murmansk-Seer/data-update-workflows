name: 数据仓库更新流水线

on:
  schedule:
    - cron: "0,30 * * * *"

  workflow_dispatch:
    inputs:
      force-update-assets:
        type: boolean
        description: "强制更新 seer-unity-assets (ConfigPackage, DefaultPackage)"
        required: false
        default: false
      force-update-config:
        type: boolean
        description: "强制更新 config-sources"
        required: false
        default: false
      dispatch-api-data:
        type: boolean
        description: "config-sources 更新后触发 api-data 构建"
        required: false
        default: true

concurrency:
  group: data-update-workflows
  cancel-in-progress: false

env:
  UNITY_ASSETS_REPO: "Murmansk-Seer/seer-unity-assets"
  CONFIG_SOURCE_REPO: "Murmansk-Seer/config-sources"
  TQDM_MININTERVAL: 5

permissions:
  actions: write
  contents: write

jobs:
  update-unity-assets:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.update-main.outputs.has_update == 'true' }}

    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 6

      - name: 检出脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: ./.github/actions/setup-environment
        with:
          python-version: "3.10"
          install-dependencies: "true"

      - name: 检查更新
        id: check-update
        run: |
          echo "🚀 开始检查更新..."
          uv run check-seer-assets main
          echo "✅ 检查更新完成"

      - name: 检查跨仓库令牌
        if: ${{ steps.check-update.outputs.need_update_main == 'true' || inputs.force-update-assets }}
        env:
          CROSS_REPO_TOKEN: ${{ secrets.PAT }}
        run: |
          if [ -z "${CROSS_REPO_TOKEN}" ]; then
            echo "::error::缺少仓库 Secret PAT，无法更新 ${UNITY_ASSETS_REPO}"
            exit 1
          fi

      - name: 检出 seer-unity-assets
        id: checkout-main-repo
        uses: ./.github/actions/checkout-repo
        if: ${{ steps.check-update.outputs.need_update_main == 'true' || inputs.force-update-assets }}
        with:
          repository: ${{ env.UNITY_ASSETS_REPO }}
          path: "seer-unity-assets"
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 更新 seer-unity-assets
        id: update-main
        working-directory: seer-unity-assets
        if: ${{ steps.check-update.outputs.need_update_main == 'true' || inputs.force-update-assets }}
        run: |
          echo "🚀 开始处理 seer-unity-assets 数据..."
          uv run update-seer-assets \
            --repo-path . \
            --packages ConfigPackage,DefaultPackage \
            ${{ inputs.force-update-assets && '--force' || '' }}
          echo "✅ seer-unity-assets 数据处理完成"

  update-config-sources:
    runs-on: ubuntu-latest
    needs: update-unity-assets

    steps:
      - name: 检出脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: ./.github/actions/setup-environment
        with:
          python-version: "3.10"
          install-dependencies: "true"

      - name: 检查跨仓库令牌
        env:
          CROSS_REPO_TOKEN: ${{ secrets.PAT }}
        run: |
          if [ -z "${CROSS_REPO_TOKEN}" ]; then
            echo "::error::缺少仓库 Secret PAT，无法更新 ${CONFIG_SOURCE_REPO}"
            exit 1
          fi

      - name: 检出仓库
        id: checkout-repo
        uses: ./.github/actions/checkout-repo
        with:
          repository: ${{ env.CONFIG_SOURCE_REPO }}
          path: "config-sources"
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 运行数据处理
        id: update
        working-directory: ${{ steps.checkout-repo.outputs.repo-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "🚀 开始处理数据..."
          uv run update-config-sources ${{ inputs.force-update-config && '--force' || '' }}
          echo "✅ 数据处理完成"

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        if: >-
          steps.update.outputs.has_update == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.dispatch-api-data)
        with:
          token: ${{ secrets.PAT }}
          repository: Murmansk-Seer/api-data
          event-type: config-source-update
